---
- name: Download Installer
  when: _java_agent_install_needed
  block:
    - name: Download MSI on Remote Host
      ansible.windows.win_get_url:
        url: "{{ java_vars.installer_url }}"
        dest: 'c:\java.zip'
  rescue:
    - name: Download MSI on Ansible Host
      ansible.builtin.get_url:
        url: "{{ dotnet_vars.installer_url }}"
        dest: /tmp/nrjava.zip
      run_once: True
      become: False
      delegate_to: localhost
    - name: Copy Package Over
      ansible.windows.win_copy:
        src: /tmp/nrjava.zip
        dest: 'c:\java.zip'
        remote_src: False

- name: Install agent
  when: _java_agent_install_needed
  block:
    - name: Unzip The Package
      community.windows.win_unzip:
        src:  'c:\java.zip'
        remote_src: True
        dest: 'c:\nrjava'
        delete_archive: True
    - name: Stop windows services
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
      loop: "{{ java_upgrade_agent_restart_services }}"
    - name: Remove The Install Directory
      ansible.windows.win_file:
        path: '{{ java_vars.directories.install }}'
        state: absent
    - name: Create New Relic Directory
      ansible.windows.win_file:
        path: '{{ java_vars.directories.install | win_dirname }}'
        state: directory
    - name: Rename Agent Files
      ansible.windows.win_shell: >-
        Move-item -path 'c:\nrjava\newrelic' -destination '{{ java_vars.directories.install }}'
  always:
    - name: Clean Up
      ansible.windows.win_file:
        path: c:\nrjava
        state: absent

- name: Template Config
  ansible.windows.win_template:
    src: newrelic.yml.j2
    dest: "{{ java_vars.directories.config }}\\newrelic.yml"
